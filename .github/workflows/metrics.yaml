name: Metrics
on:
  # Schedule daily updates
  schedule: 
    - cron: "0 20 * * *"
  workflow_dispatch:
  # push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hugefiver
          base: header
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines,percentage,bytes
          plugin_languages_analysis_timeout: 60
          plugin_languages_recent_days: 30
          plugin_lines: yes
          plugin_lines_sections: history
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_filter: ref/create,ref/delete,release,push,issue,pr,review,wiki,public
      - name: Half-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
      - name: Recent activity charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.habits.charts.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          config_timezone: 'Asia/Shanghai'
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_languages_threshold: 10%
